name: Deploy MkDocs site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check generated JSON exists
        run: |
          test -f docs/data/la_send_latest_summary.json
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("docs/data/la_send_latest_summary.json")
          data = json.loads(p.read_text(encoding="utf-8"))

          print("JSON:", p)
          print("records:", len(data.get("records", [])))
          print("wide_records:", len(data.get("wide_records", [])))
          print("profiles:", len(data.get("profiles", [])))
          PY

      - name: Build site
        run: |
          python -m mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4